<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ちねかま練</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f7ff; color: #333; min-height: 100vh; }
header { background: linear-gradient(135deg, #1a6b3c, #2ecc71); color: white; padding: 18px 20px; text-align: center; }
header h1 { font-size: 1.8rem; letter-spacing: 2px; }
header p { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }
.sync-status { font-size: 0.75rem; margin-top: 4px; opacity: 0.9; }
.tabs { display: flex; background: white; border-bottom: 2px solid #2ecc71; }
.tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 0.9rem; font-weight: bold; color: #666; }
.tab.active { color: #1a6b3c; border-bottom: 3px solid #1a6b3c; background: #f0fff5; }
.view { display: none; padding: 16px; }
.view.active { display: block; }
.card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px; }
.card-title { font-size: 1rem; font-weight: bold; color: #1a6b3c; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
.edit-badge { font-size: 0.75rem; background: #fff3cd; color: #856404; padding: 3px 10px; border-radius: 10px; font-weight: normal; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 0.82rem; color: #555; margin-bottom: 5px; font-weight: bold; }
.time-row { display: flex; gap: 10px; }
.time-row .form-group { flex: 1; }
input[type=date], input[type=time], input[type=text], textarea {
  width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.95rem; background: #fafafa;
}
textarea { resize: vertical; min-height: 70px; font-family: inherit; }
input:focus, textarea:focus { outline: none; border-color: #2ecc71; background: white; }
.add-row { display: flex; gap: 8px; margin-top: 8px; }
.add-row input { flex: 1; }
.add-row button { padding: 10px 14px; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
.chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
.chip { padding: 8px 14px; border: 1.5px solid #ddd; border-radius: 20px; cursor: pointer; font-size: 0.85rem; background: white; display: inline-flex; align-items: center; gap: 6px; user-select: none; }
.chip.join { background: #1a6b3c; border-color: #1a6b3c; color: white; }
.chip.ng { background: #e74c3c; border-color: #e74c3c; color: white; }
.chip.sel { background: #1a6b3c; border-color: #1a6b3c; color: white; }
.chip .x { font-size: 0.75rem; opacity: 0.7; }
.legend { display: flex; gap: 12px; font-size: 0.75rem; color: #888; margin-bottom: 10px; }
.dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 2px; }
.res-row { display: flex; gap: 8px; }
.res-btn { flex: 1; padding: 10px; border: 1.5px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 0.85rem; text-align: center; }
.res-btn.ok { background: #d4f5e2; border-color: #2ecc71; color: #1a6b3c; font-weight: bold; }
.res-btn.pending { background: #fff8e1; border-color: #f39c12; color: #e67e22; font-weight: bold; }
.res-btn.norev { background: #f0f0f0; border-color: #aaa; color: #555; font-weight: bold; }
.btn-row { display: flex; gap: 10px; }
.save-btn { flex: 1; padding: 14px; background: linear-gradient(135deg, #1a6b3c, #2ecc71); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; }
.cancel-btn { padding: 14px 20px; background: #eee; color: #666; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; }
.cal-header { display: flex; align-items: center; justify-content: space-between; background: white; border-radius: 10px; padding: 12px 16px; margin-bottom: 12px; }
.cal-header h2 { font-size: 1rem; color: #1a6b3c; }
.cal-nav { background: #2ecc71; color: white; border: none; border-radius: 6px; width: 32px; height: 32px; cursor: pointer; font-size: 1rem; }
.cal-grid { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
.cal-dow { display: grid; grid-template-columns: repeat(7,1fr); background: #1a6b3c; }
.cal-dow span { text-align: center; padding: 8px 0; color: white; font-size: 0.75rem; font-weight: bold; }
.cal-days { display: grid; grid-template-columns: repeat(7,1fr); }
.cal-day { min-height: 52px; padding: 4px; border: 0.5px solid #f0f0f0; }
.cal-day.clickable { cursor: pointer; }
.cal-day.clickable:hover { background: #f0fff5; }
.cal-day.has-ev { background: #f0fff5; }
.cal-day.today .dn { background: #1a6b3c; color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
.cal-day.other .dn { color: #ccc; }
.cal-day.sun .dn { color: #e74c3c; }
.cal-day.sat .dn { color: #3498db; }
.dn { font-size: 0.8rem; color: #555; }
.ev-dot { width: 6px; height: 6px; background: #2ecc71; border-radius: 50%; margin: 2px auto 0; }
.ev-lbl { font-size: 0.65rem; color: #1a6b3c; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rec-card { background: white; border-radius: 10px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); border-left: 4px solid #2ecc71; }
.rec-top { display: flex; justify-content: space-between; align-items: flex-start; }
.rec-info { flex: 1; cursor: pointer; }
.rec-date { font-weight: bold; color: #1a6b3c; font-size: 0.95rem; }
.rec-sub { font-size: 0.82rem; color: #777; margin-top: 3px; }
.rec-memo { font-size: 0.82rem; color: #999; margin-top: 3px; font-style: italic; }
.edit-btn { background: #f0fff5; border: 1.5px solid #2ecc71; color: #1a6b3c; border-radius: 8px; padding: 6px 12px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; margin-left: 8px; }
.empty { text-align: center; color: #aaa; padding: 30px; font-size: 0.9rem; }
.loading { text-align: center; color: #aaa; padding: 30px; font-size: 0.9rem; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 380px; max-height: 85vh; overflow-y: auto; }
.modal h3 { color: #1a6b3c; margin-bottom: 14px; }
.mrow { display: flex; margin-bottom: 8px; font-size: 0.9rem; }
.mlbl { width: 90px; color: #888; flex-shrink: 0; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 0.78rem; margin: 2px; }
.bg { background: #d4f5e2; color: #1a6b3c; }
.br { background: #fde8e8; color: #c0392b; }
.bo { background: #fff3cd; color: #856404; }
.bgr { background: #f0f0f0; color: #555; }
.mbtn { width: 100%; margin-top: 8px; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
.mbtn.close-btn { background: #eee; }
.mbtn.del-btn { background: #fde8e8; color: #c0392b; }
</style>
</head>
<body>
<header>
  <h1>🏓 ちねかま練</h1>
  <p>ピックルボール練習管理</p>
  <div class="sync-status" id="sync-status">🔄 接続中...</div>
  <div id="error-msg" style="display:none;background:#c0392b;padding:6px 12px;border-radius:6px;margin-top:6px;font-size:0.75rem;"></div>
</header>
<div class="tabs">
  <div class="tab active" id="tab-form" onclick="switchTab('form')">➕ 登録</div>
  <div class="tab" id="tab-calendar" onclick="switchTab('calendar')">📅 カレンダー</div>
  <div class="tab" id="tab-list" onclick="switchTab('list')">📋 一覧</div>
</div>

<div id="view-form" class="view active">
  <div class="card">
    <div class="card-title">
      <span>📅 日時</span>
      <span class="edit-badge" id="edit-badge" style="display:none">✏️ 編集中</span>
    </div>
    <div class="form-group"><label>日付</label><input type="date" id="f-date"></div>
    <div class="time-row">
      <div class="form-group"><label>開始</label><input type="time" id="f-start" value="19:00"></div>
      <div class="form-group"><label>終了</label><input type="time" id="f-end" value="21:00"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">🏟️ コート</div>
    <div class="chip-wrap" id="court-chips"></div>
    <div class="add-row">
      <input type="text" id="court-inp" placeholder="コート名を追加...">
      <button onclick="addCourt()">追加</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">🔖 予約状況</div>
    <div class="res-row">
      <div class="res-btn" id="res-ok" onclick="setRes('ok')">✅ 予約済み</div>
      <div class="res-btn" id="res-pending" onclick="setRes('pending')">⏳ 未予約</div>
      <div class="res-btn" id="res-norev" onclick="setRes('norev')">－ 不要</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">👥 メンバー・誘い状況</div>
    <div class="legend">
      <span><span class="dot" style="background:#1a6b3c"></span>参加</span>
      <span><span class="dot" style="background:#e74c3c"></span>誘ってダメ</span>
      <span style="color:#bbb">タップで切替</span>
    </div>
    <div class="chip-wrap" id="member-chips"></div>
    <div class="add-row">
      <input type="text" id="member-inp" placeholder="名前を追加...">
      <button onclick="addMember()">追加</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">📝 メモ</div>
    <textarea id="f-memo" placeholder="気づいたこと、次回の目標など..."></textarea>
  </div>
  <div class="card">
    <div class="btn-row">
      <button class="cancel-btn" id="cancel-edit-btn" style="display:none" onclick="cancelEdit()">キャンセル</button>
      <button class="save-btn" id="save-btn" onclick="saveRecord()">💾 保存する</button>
    </div>
  </div>
</div>

<div id="view-calendar" class="view">
  <div class="cal-header">
    <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
    <h2 id="cal-label"></h2>
    <button class="cal-nav" onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-grid">
    <div class="cal-dow"><span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span></div>
    <div class="cal-days" id="cal-days"></div>
  </div>
</div>

<div id="view-list" class="view">
  <div id="rec-list"><div class="loading">📡 データ読み込み中...</div></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="m-date"></h3>
    <div class="mrow"><span class="mlbl">🕐 時間</span><span id="m-time"></span></div>
    <div class="mrow"><span class="mlbl">🏟️ コート</span><span id="m-court"></span></div>
    <div class="mrow"><span class="mlbl">🔖 予約</span><span id="m-res"></span></div>
    <div class="mrow"><span class="mlbl">👥 参加</span><span id="m-join"></span></div>
    <div class="mrow"><span class="mlbl">❌ NG</span><span id="m-ng"></span></div>
    <div class="mrow" id="m-memo-row"><span class="mlbl">📝 メモ</span><span id="m-memo" style="white-space:pre-wrap;"></span></div>
    <button class="mbtn close-btn" onclick="closeOverlay()">閉じる</button>
    <div id="del-confirm" style="display:none;margin-top:8px;background:#fff0f0;border-radius:8px;padding:12px;text-align:center;">
      <div style="font-size:0.9rem;margin-bottom:10px;">本当に削除しますか？</div>
      <div style="display:flex;gap:8px;">
        <button class="mbtn" style="flex:1;background:#eee;" onclick="document.getElementById('del-confirm').style.display='none'">キャンセル</button>
        <button class="mbtn del-btn" style="flex:1;" onclick="execDelete()">削除する</button>
      </div>
    </div>
    <button class="mbtn del-btn" onclick="document.getElementById('del-confirm').style.display='block'">🗑️ 削除する</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, push, set, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDjtTTimx0knSOzj4_h4ZPx8mK7VhyN0fw",
  authDomain: "chinekamatest.firebaseapp.com",
  databaseURL: "https://chinekamatest-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "chinekamatest",
  storageBucket: "chinekamatest.firebasestorage.app",
  messagingSenderId: "389367838497",
  appId: "1:389367838497:web:f52889966e84d0fa843060"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function showError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
  document.getElementById('sync-status').textContent = '🔴 接続失敗';
}

// ===== STATE =====
var courts = ['江坂'];
var selectedCourt = '';
var resVal = '';
var members = ['ちねん','かまえ','いきふね','むらかわ'];
var memberState = {};
var records = []; // [{fbKey, date, start, end, court, res, join, ng, memo}]
var calY, calM;
var openKey = null;
var editKey = null;

// ===== FIREBASE =====
var recordsRef = ref(db, 'records');
var courtsRef  = ref(db, 'courts');
var membersRef = ref(db, 'members');

// リアルタイム同期：records
onValue(recordsRef, function(snap) {
  records = [];
  var val = snap.val();
  if (val) {
    Object.keys(val).forEach(function(k) {
      var r = val[k];
      r.fbKey = k;
      records.push(r);
    });
    records.sort(function(a,b){return a.date<b.date?-1:1;});
  }
  renderCalendar();
  renderList();
  document.getElementById('sync-status').textContent = '🟢 同期済み';
}, function(error) {
  showError('DB読み込みエラー: ' + error.message);
});

// リアルタイム同期：courts
onValue(courtsRef, function(snap) {
  var val = snap.val();
  if (val) courts = val;
  renderCourts();
});

// リアルタイム同期：members
onValue(membersRef, function(snap) {
  var val = snap.val();
  if (val) {
    members = val;
    var cur = {};
    members.forEach(function(m){ cur[m] = memberState[m] || ''; });
    memberState = cur;
    renderMembers();
  }
});

function saveCourts() { set(courtsRef, courts); }
function saveMembers() { set(membersRef, members); }

// ===== INIT =====
var t = new Date();
calY = t.getFullYear(); calM = t.getMonth();
document.getElementById('f-date').value = t.toISOString().split('T')[0];
document.getElementById('overlay').addEventListener('click', function(e){
  if(e.target===document.getElementById('overlay')) closeOverlay();
});
resetMembers();
renderCourts();
renderCalendar();

// ===== COURT =====
function renderCourts() {
  var el=document.getElementById('court-chips'); el.innerHTML='';
  courts.forEach(function(name){
    var chip=document.createElement('div');
    chip.className='chip'+(name===selectedCourt?' sel':'');
    var span=document.createElement('span'); span.textContent=name;
    span.addEventListener('click',function(){selectedCourt=(selectedCourt===name)?'':name;renderCourts();});
    var x=document.createElement('span'); x.className='x'; x.textContent='✕';
    x.addEventListener('click',function(e){
      e.stopPropagation();
      courts=courts.filter(function(c){return c!==name;});
      if(selectedCourt===name)selectedCourt='';
      saveCourts();
    });
    chip.appendChild(span); chip.appendChild(x); el.appendChild(chip);
  });
}
window.addCourt = function() {
  var inp=document.getElementById('court-inp'), v=inp.value.trim();
  if(!v)return; if(courts.indexOf(v)>=0){alert('すでに登録されています');return;}
  courts.push(v); selectedCourt=v; inp.value=''; saveCourts();
};

// ===== RESERVATION =====
window.setRes = function(val) {
  resVal=val;
  ['ok','pending','norev'].forEach(function(k){document.getElementById('res-'+k).className='res-btn'+(k===val?' '+k:'');});
};

// ===== MEMBERS =====
function resetMembers() {
  memberState={};
  members.forEach(function(m){memberState[m]='';});
  renderMembers();
}
function renderMembers() {
  var el=document.getElementById('member-chips'); el.innerHTML='';
  members.forEach(function(name,i){
    var st=memberState[name]||'';
    var chip=document.createElement('div'); chip.className='chip'+(st?' '+st:'');
    var span=document.createElement('span'); span.textContent=name;
    span.addEventListener('click',function(){toggleMember(name);});
    chip.appendChild(span);
    if(i>=4){
      var x=document.createElement('span'); x.className='x'; x.textContent='✕';
      x.addEventListener('click',function(e){
        e.stopPropagation();
        members=members.filter(function(m){return m!==name;});
        delete memberState[name];
        saveMembers();
      });
      chip.appendChild(x);
    }
    el.appendChild(chip);
  });
}
function toggleMember(name){
  var cur=memberState[name]||'';
  memberState[name]=cur===''?'join':cur==='join'?'ng':'';
  renderMembers();
}
window.addMember = function(){
  var inp=document.getElementById('member-inp'), v=inp.value.trim();
  if(!v)return; if(memberState.hasOwnProperty(v)){alert('すでにいます');return;}
  members.push(v); memberState[v]='join'; inp.value=''; saveMembers();
};

// ===== EDIT =====
window.startEdit = function(key) {
  var r = records.find(function(r){return r.fbKey===key;});
  if(!r)return;
  editKey = key;
  document.getElementById('f-date').value=r.date;
  document.getElementById('f-start').value=r.start;
  document.getElementById('f-end').value=r.end;
  document.getElementById('f-memo').value=r.memo||'';
  selectedCourt=r.court||''; renderCourts();
  resVal=r.res||'';
  ['ok','pending','norev'].forEach(function(k){document.getElementById('res-'+k).className='res-btn'+(k===resVal?' '+k:'');});
  memberState={};
  members.forEach(function(m){memberState[m]='';});
  (r.join||[]).forEach(function(n){if(!memberState.hasOwnProperty(n)){members.push(n);}memberState[n]='join';});
  (r.ng||[]).forEach(function(n){if(!memberState.hasOwnProperty(n)){members.push(n);}memberState[n]='ng';});
  renderMembers();
  document.getElementById('edit-badge').style.display='inline-block';
  document.getElementById('cancel-edit-btn').style.display='block';
  document.getElementById('save-btn').textContent='✏️ 更新する';
  switchTab('form');
  window.scrollTo(0,0);
};

window.cancelEdit = function(){
  editKey=null; resetForm();
};

function resetForm(){
  editKey=null;
  var t=new Date();
  document.getElementById('f-date').value=t.toISOString().split('T')[0];
  document.getElementById('f-start').value='19:00';
  document.getElementById('f-end').value='21:00';
  document.getElementById('f-memo').value='';
  resVal=''; selectedCourt='';
  ['ok','pending','norev'].forEach(function(k){document.getElementById('res-'+k).className='res-btn';});
  document.getElementById('edit-badge').style.display='none';
  document.getElementById('cancel-edit-btn').style.display='none';
  document.getElementById('save-btn').textContent='💾 保存する';
  resetMembers(); renderCourts();
}

// ===== SAVE =====
window.saveRecord = function(){
  var date=document.getElementById('f-date').value;
  if(!date){alert('日付を入力してください');return;}
  var join=[],ng=[];
  Object.keys(memberState).forEach(function(k){if(memberState[k]==='join')join.push(k);else if(memberState[k]==='ng')ng.push(k);});
  var rec={date:date,start:document.getElementById('f-start').value,end:document.getElementById('f-end').value,court:selectedCourt,res:resVal,join:join,ng:ng,memo:document.getElementById('f-memo').value.trim()};
  if(editKey){
    set(ref(db,'records/'+editKey), rec);
    alert('✅ 更新しました！');
  } else {
    push(recordsRef, rec);
    alert('✅ 保存しました！');
  }
  resetForm();
};

// ===== CALENDAR =====
window.changeMonth = function(d){calM+=d;if(calM>11){calM=0;calY++;}else if(calM<0){calM=11;calY--;}renderCalendar();};
function renderCalendar(){
  document.getElementById('cal-label').textContent=calY+'年'+(calM+1)+'月';
  var el=document.getElementById('cal-days');el.innerHTML='';
  var first=new Date(calY,calM,1).getDay(),last=new Date(calY,calM+1,0).getDate();
  var prevLast=new Date(calY,calM,0).getDate(),today=new Date();
  for(var i=0;i<first;i++){var d=document.createElement('div');d.className='cal-day other';d.innerHTML='<div class="dn">'+(prevLast-first+1+i)+'</div>';el.appendChild(d);}
  for(var day=1;day<=last;day++){
    var ds=calY+'-'+pad(calM+1)+'-'+pad(day),matched=[];
    records.forEach(function(r,ri){if(r.date===ds)matched.push(ri);});
    var dow=new Date(calY,calM,day).getDay(),cls='cal-day';
    if(dow===0)cls+=' sun';else if(dow===6)cls+=' sat';
    if(today.getFullYear()===calY&&today.getMonth()===calM&&today.getDate()===day)cls+=' today';
    if(matched.length)cls+=' has-ev clickable';
    var d=document.createElement('div');d.className=cls;
    var inner='<div class="dn">'+day+'</div>';
    matched.forEach(function(ri){inner+='<div class="ev-dot"></div><div class="ev-lbl">'+(records[ri].court||'練習')+'</div>';});
    d.innerHTML=inner;
    if(matched.length){(function(key){d.addEventListener('click',function(){openModal(key);});})(records[matched[0]].fbKey);}
    el.appendChild(d);
  }
  var rem=(7-((first+last)%7))%7;
  for(var i2=1;i2<=rem;i2++){var d2=document.createElement('div');d2.className='cal-day other';d2.innerHTML='<div class="dn">'+i2+'</div>';el.appendChild(d2);}
}

// ===== LIST =====
function renderList(){
  var el=document.getElementById('rec-list');
  if(!records.length){el.innerHTML='<div class="empty">記録がありません</div>';return;}
  el.innerHTML='';
  for(var i=records.length-1;i>=0;i--){
    var r=records[i];
    var resLbl=({ok:'✅ 予約済み',pending:'⏳ 未予約',norev:'－ 不要','':'未設定'})[r.res]||'';
    var card=document.createElement('div');card.className='rec-card';
    var html='<div class="rec-top"><div class="rec-info">'
      +'<div class="rec-date">📅 '+fmtDate(r.date)+' '+r.start+'〜'+r.end+'</div>'
      +'<div class="rec-sub">🏟️ '+(r.court||'未設定')+' ｜ '+resLbl+'</div>'
      +'<div class="rec-sub">👥 '+(r.join&&r.join.length?r.join.join('・'):'未設定')+(r.ng&&r.ng.length?' ❌NG:'+r.ng.join('・'):'')+' </div>'
      +(r.memo?'<div class="rec-memo">📝 '+r.memo+'</div>':'')
      +'</div><button class="edit-btn">✏️ 編集</button></div>';
    card.innerHTML=html;
    (function(key){
      card.querySelector('.rec-info').addEventListener('click',function(){openModal(key);});
      card.querySelector('.edit-btn').addEventListener('click',function(e){e.stopPropagation();startEdit(key);});
    })(r.fbKey);
    el.appendChild(card);
  }
}

function pad(n){return('0'+n).slice(-2);}
function fmtDate(s){if(!s)return'';var p=s.split('-'),dow=['日','月','火','水','木','金','土'][new Date(s).getDay()];return p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日('+dow+')';}

// ===== MODAL =====
function openModal(key){
  openKey=key;
  var r=records.find(function(r){return r.fbKey===key;});
  if(!r)return;
  var resMap={ok:'<span class="badge bg">✅ 予約済み</span>',pending:'<span class="badge bo">⏳ 未予約</span>',norev:'<span class="badge bgr">－ 不要</span>','':'<span class="badge bgr">未設定</span>'};
  document.getElementById('m-date').textContent='📅 '+fmtDate(r.date);
  document.getElementById('m-time').textContent=r.start+' 〜 '+r.end;
  document.getElementById('m-court').textContent=r.court||'未設定';
  document.getElementById('m-res').innerHTML=resMap[r.res]||'';
  document.getElementById('m-join').innerHTML=r.join&&r.join.length?r.join.map(function(n){return'<span class="badge bg">'+n+'</span>';}).join(''):'未設定';
  document.getElementById('m-ng').innerHTML=r.ng&&r.ng.length?r.ng.map(function(n){return'<span class="badge br">'+n+'</span>';}).join(''):'なし';
  var memoRow=document.getElementById('m-memo-row');
  if(r.memo){document.getElementById('m-memo').textContent=r.memo;memoRow.style.display='flex';}else{memoRow.style.display='none';}
  document.getElementById('del-confirm').style.display='none';
  document.getElementById('overlay').classList.add('open');
}
window.execDelete = function(){
  if(!openKey)return;
  remove(ref(db,'records/'+openKey));
  openKey=null; closeOverlay();
};
window.closeOverlay = function(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('del-confirm').style.display='none';
};
window.switchTab = function(t){
  ['form','calendar','list'].forEach(function(k){
    document.getElementById('tab-'+k).classList.toggle('active',k===t);
    document.getElementById('view-'+k).classList.toggle('active',k===t);
  });
  if(t==='calendar')renderCalendar();
  if(t==='list')renderList();
};
// グローバル公開
window.renderCourts=renderCourts;
window.renderMembers=renderMembers;
</script>
</body>
